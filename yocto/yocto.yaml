header:
  version: 14

repos:

  poky:
    url: "https://git.yoctoproject.org/poky"
    path: "layers/poky"
    layers:
      meta:
      meta-poky:
      meta-yocto-bsp:

  bitbake:
    url: "https://github.com/openembedded/bitbake.git"
    path: "layers/bitbake"
    layers:
      bitbake: "disabled"

  meta-openembedded:
    url: "https://github.com/openembedded/meta-openembedded.git"
    path: "layers/meta-openembedded"
    layers:
      meta-filesystems:
      meta-gnome:
      meta-initramfs:
      meta-multimedia:
      meta-networking:
      meta-oe:
      meta-perl:
      meta-python:
      meta-webserver:
      meta-xfce:

  meta-selinux:
    url: "https://git.yoctoproject.org/meta-selinux"
    path: "layers/meta-selinux"
    layers:
      .:

local_conf_header:
  distro: |
    WARN_QA:remove = "license-exists"
