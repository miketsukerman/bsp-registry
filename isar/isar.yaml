header:
  version: 14
  includes:
    - isar/common.yaml

build_system: isar

repos:
  isar:
    url: "https://github.com/ilbers/isar.git"
    path: "layers/isar"
    layers:
      meta:
      meta-isar:
      meta-test:

local_conf_header:
  image: |
    IMAGE_FSTYPES = "wic"

bblayers_conf_header:
  standard: |
    BBPATH = "${TOPDIR}"
    BBFILES ?= ""
