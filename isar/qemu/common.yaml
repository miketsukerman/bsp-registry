header:
  version: 14

target:
  - isar-image-base

local_conf_header:
  wks-file: |
    # Set the default WKS_FILE to use for image generation
    WKS_FILE = "qemudefault.wks"

  # INFO: To set up a proper user use mkpasswd -m sha-512 yourpassword and add the output to USER_<name>[password]
  add-root-user: |
    GROUPS += "qemu"
    GROUP_qemu[flags] = "system"

    USERS += "qemu"
    USER_qemu[gid] = "qemu"
    USER_qemu[home] = "/home/qemu"
    USER_qemu[comment] = "My QEMU user"
    USER_qemu[flags] = "system create-home"

    USER_qemu[password] = "123456"
    USER_qemu[flags] += "clear-text-password"

    # Set a root passwordless user for testing purposes
    USERS += "root"
    USER_root[password] = ""
    USER_root[flags] = "allow-empty-password"
  preinstall: |
    IMAGE_PREINSTALL += " \
      iproute2         \
      net-tools        \
      openssh-server   \
      vim              \
      isc-dhcp-client  \
      connman \
      links \
      htop \
      curl \
      wget \
      iputils-ping \
    "

    IMAGE_INSTALL += "   \
        sshd-regen-keys  \
    " 

    IMAGE_PREINSTALL += " \
        libxml2 \ 
        libx11-6 \
        libxext6  \
        libxtst6  \
        libmosquitto1 \   
        sqlite3 \
        xterm \
        ethtool \ 
        lua5.1 \
        sshpass \
        x11vnc \
    "
